name: build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 获取版本号
        id: get_version
        run: |
          version=$(curl -s https://api.github.com/repos/caddyserver/caddy/releases/latest | grep -oP '"tag_name": "\K(.*)(?=")')
          echo "version=$latest_tag" >> $GITHUB_OUTPUT

      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Go
        uses: actions/setup-go@v5
        with: { go-version: "stable" }

      - name: 缓存 Go 模块
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 安装 xcaddy
        run: go install -v github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: 编译 caddy 和插件
        env:
          CADDY_VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          xcaddy build --output dist/caddy \
            --with github.com/mholt/caddy-l4 \
            --with github.com/baldinof/caddy-supervisor \
            --with github.com/invzhi/caddy-docker-upstreams \
            --with github.com/greenpau/caddy-git \
            --with github.com/WingLim/caddy-webhook \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/caddy-dns/alidns \
            --with github.com/caddy-dns/godaddy \
            --with magnax.ca/caddy/gopkg

      - name: 设置QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GH_TOKEN }}"

      - name: 登录DCR
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DCR_USER }}"
          password: "${{ secrets.DCR_TOKEN }}"

      - name: 构建推送
        uses: docker/build-push-action@v5
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            cnk3x/caddy:latest
            ghcr.io/cnk3x/docker-caddy:latest
            cnk3x/caddy:${{ steps.get_version.outputs.version }}
            ghcr.io/cnk3x/docker-caddy:${{ steps.get_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
