name: build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - id: get_version
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/caddyserver/caddy/releases/latest | grep -oP '"tag_name": "\K(.*)(?=")' | sed 's/v//g')
          echo "version=$latest_tag"
          echo "version=$latest_tag" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with: { go-version: "stable" }

      - run: go install -v github.com/caddyserver/xcaddy/cmd/xcaddy@latest

      - name: 编译(amd64)
        env:
          CADDY_VERSION: "v${{ steps.get_version.outputs.version }}"
          CGO_ENABLED: "0"
          GOOS: "linux"
          GOARCH: "amd64"
          XCADDY_GO_BUILD_FLAGS: "-v -ldflags '-w -s' -trimpath -tags nobadger,nomysql,nopgx"
        run: |
          ~/go/bin/xcaddy build --output dist/caddy-amd64 \
            --with github.com/mholt/caddy-l4 \
            --with github.com/baldinof/caddy-supervisor \
            --with github.com/invzhi/caddy-docker-upstreams \
            --with github.com/greenpau/caddy-git \
            --with github.com/WingLim/caddy-webhook \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/caddy-dns/alidns \
            --with github.com/caddy-dns/godaddy \
            --with magnax.ca/caddy/gopkg

      - name: 编译(arm64)
        env:
          CADDY_VERSION: "v${{ steps.get_version.outputs.version }}"
          CGO_ENABLED: "0"
          GOOS: "linux"
          GOARCH: "arm64"
          XCADDY_GO_BUILD_FLAGS: "-v -ldflags '-w -s' -trimpath -tags nobadger,nomysql,nopgx"
        run: |
          ~/go/bin/xcaddy build --output dist/caddy-arm64 \
            --with github.com/mholt/caddy-l4 \
            --with github.com/baldinof/caddy-supervisor \
            --with github.com/invzhi/caddy-docker-upstreams \
            --with github.com/greenpau/caddy-git \
            --with github.com/WingLim/caddy-webhook \
            --with github.com/caddy-dns/cloudflare \
            --with github.com/caddy-dns/alidns \
            --with github.com/caddy-dns/godaddy \
            --with magnax.ca/caddy/gopkg

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: 登录GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ secrets.GH_TOKEN }}"

      - name: 登录DCR
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DCR_USER }}"
          password: "${{ secrets.DCR_TOKEN }}"

      - name: 构建推送
        uses: docker/build-push-action@v5
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            cnk3x/caddy:latest
            ghcr.io/cnk3x/docker-caddy:latest
            cnk3x/caddy:${{ steps.get_version.outputs.version }}
            ghcr.io/cnk3x/docker-caddy:${{ steps.get_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
